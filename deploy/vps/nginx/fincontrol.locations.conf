# Include this file inside the HTTPS server block for hrmmotos.com.br.

location = /fincontrol {
    return 301 /fincontrol/;
}

location /fincontrol/api/ {
    proxy_pass http://127.0.0.1:3102/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /fincontrol;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_max_body_size 20M;
    proxy_buffering off;
}

location /fincontrol/auth/ {
    proxy_pass http://127.0.0.1:3102/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /fincontrol;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering off;
}

location /fincontrol/health/ {
    proxy_pass http://127.0.0.1:3102/health/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /fincontrol;
    access_log off;
}

location /fincontrol/assets/ {
    alias /var/www/hrmmotos.com.br/fincontrol/current/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location /fincontrol/ {
    alias /var/www/hrmmotos.com.br/fincontrol/current/;
    index index.html;
    try_files $uri $uri/ /fincontrol/index.html;
}
