services:
  postgres:
    image: postgres:17-alpine
    container_name: fincontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fincontrol}
      POSTGRES_USER: ${DB_USER:-fincontrol}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fincontrol_local}
    ports:
      - "127.0.0.1:${DB_PORT:-5434}:5432"
    volumes:
      - fincontrol_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fincontrol} -d ${DB_NAME:-fincontrol}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: fincontrol-api:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fincontrol}
      DB_USER: ${DB_USER:-fincontrol}
      DB_PASSWORD: ${DB_PASSWORD:-fincontrol_local}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-30000}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-5000}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET:?AUTH_ACCESS_TOKEN_SECRET is required}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:-900}
      AUTH_REFRESH_TOKEN_TTL_DAYS: ${AUTH_REFRESH_TOKEN_TTL_DAYS:-30}
      AUTH_ISSUER: ${AUTH_ISSUER:-fincontrol-api}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-fincontrol}
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /
    image: fincontrol-web:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  fincontrol_postgres_data:
