name: CI

on:
  push:
    branches: [main, "agent/**", "feature/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: bash scripts/validate-migrations.sh

  database:
    name: PostgreSQL migrations and integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fincontrol
          POSTGRES_USER: fincontrol
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fincontrol -d fincontrol"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: fincontrol
      DB_USER: fincontrol
      DB_PASSWORD: ${{ github.run_id }}
      DB_POOL_MAX: 5
      DB_IDLE_TIMEOUT_MS: 30000
      DB_CONNECTION_TIMEOUT_MS: 5000
      AUTH_ACCESS_TOKEN_SECRET: ci-only-secret-with-at-least-32-characters
      AUTH_ACCESS_TOKEN_TTL_SECONDS: 900
      AUTH_REFRESH_TOKEN_TTL_DAYS: 30
      AUTH_ISSUER: fincontrol-api
      AUTH_AUDIENCE: fincontrol
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply immutable migrations
        run: |
          for migration in database/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -f "$migration"
          done
      - name: Verify database structure
        run: psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -f database/scripts/verify_database.sql
      - name: Verify financial flow
        run: psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -f database/scripts/test_financial_flow.sql
      - name: Run API integration tests
        run: npm run test:integration --workspace @fincontrol/api

  containers:
    name: Container images
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: fincontrol-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: fincontrol-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
