name: Deploy VPS Native

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag or commit to deploy
        required: true
        type: string
      confirmation:
        description: Type DEPLOY to confirm
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate explicit confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: test "$CONFIRMATION" = "DEPLOY"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Execute native controlled deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          [[ "$DEPLOY_REF" =~ ^[A-Za-z0-9._/-]+$ ]]
          # The validated ref must be expanded locally.
          # shellcheck disable=SC2029
          ssh "$VPS_USER@$VPS_HOST" "sudo /opt/fincontrol/bin/deploy '$DEPLOY_REF'"
